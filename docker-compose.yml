version: '3.8'

services:
  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:Dpyt1112@db:5432/leetcode_ai
    depends_on:
      - db

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:Dpyt1112@db:5432/leetcode_ai
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Dpyt1112
      - POSTGRES_DB=leetcode_ai
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
